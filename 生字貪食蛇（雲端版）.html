<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全字體可調式問答貪食蛇 - Firebase 雲端追加範圍密碼保護版</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Microsoft JhengHei', Arial, sans-serif;
            background: #2c3e50;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }
        h1 { margin-bottom: 10px; }
        .control-panel {
            background: #34495e;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 800px;
        }
        .upload-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn-export {
            background: #2ecc71; color: white; border: none; padding: 8px 16px;
            font-size: 1em; font-weight: bold; border-radius: 6px; cursor: pointer;
            transition: background 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .btn-export:hover { background: #27ae60; }
        .btn-reset {
            background: #e74c3c; color: white; border: none; padding: 8px 16px;
            font-size: 1em; font-weight: bold; border-radius: 6px; cursor: pointer;
            transition: background 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .btn-reset:hover { background: #c0392b; }
        
        /* 篩選與設定區 */
        .setting-group {
            display: flex; justify-content: space-around; align-items: center;
            flex-wrap: wrap; margin-top: 15px; background: rgba(0,0,0,0.2);
            padding: 10px; border-radius: 8px; gap: 10px;
        }
        .filter-group {
            background: #16a085;
            padding: 12px;
            border-radius: 8px;
            margin-top: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            width: 100%;
        }
        .filter-group select {
            padding: 6px 12px;
            font-size: 1em;
            border-radius: 4px;
            border: none;
            cursor: pointer;
        }
        
        .setting-item { display: flex; align-items: center; gap: 8px; }
        .setting-item label { font-weight: bold; font-size: 0.95em; }
        .file-input { color: #ecf0f1; margin-left: 10px; }
        #gameContainer {
            position: relative; display: flex; flex-direction: column;
            align-items: center; width: 100%;
        }
        #questionBox {
            background: #f1c40f; color: #2c3e50; padding: 20px; border-radius: 8px;
            font-size: 66px; font-weight: bold; width: 100%; max-width: 1200px;
            text-align: center; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: font-size 0.1s ease;
        }
        #versionTag { font-size: 24px; display: block; color: #7f8c8d; margin-bottom: 5px; font-weight: normal; }
        .canvas-wrapper {
            background: #111; border: 4px solid #3498db; border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); overflow: hidden; display: inline-block;
        }
        canvas { display: block; cursor: crosshair; }
        .score-board {
            display: flex; gap: 40px; font-size: 1.8em; margin-top: 15px;
            font-weight: bold; background: rgba(0,0,0,0.4); padding: 10px 30px; border-radius: 20px;
        }
        #wrongNotice {
            color: #ff4757; font-size: 1.4em; margin-top: 10px;
            font-weight: bold; min-height: 1.5em; transition: all 0.2s;
        }
        #dbStatus { color: #2ecc71; font-weight: bold; font-size: 0.9em; margin-top: 5px;}
    </style>
</head>
<body>

    <h1>🐍 全字體可調式問答貪食蛇 (雲端範圍追加版)</h1>
    
    <div class="control-panel">
        <div id="setupBox" class="upload-section">
            <div class="btn-group">
                <button class="btn-export" id="btnExport">📥 下載資料庫現有所有題庫</button>
                <button class="btn-reset" id="btnReset">🔒 清空雲端並還原預設值 (需密碼)</button>
            </div>
            <hr style="width: 100%; border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 5px 0;">
            <div>
                <span>➕ 追加新題目至雲端資料庫 (`.xlsx`)：</span>
                <input type="file" id="excelFile" class="file-input" accept=".xlsx, .xls" />
                <div id="dbStatus">📡 連線雲端資料庫中...</div>
            </div>
        </div>

        <div class="filter-group">
            <label>📖 選擇遊戲範圍：</label>
            <select id="startLessonSelect"><option value="">載入中...</option></select>
            <span>至</span>
            <select id="endLessonSelect"><option value="">載入中...</option></select>
            <button class="btn-export" style="padding: 4px 12px; font-size:0.9em;" id="btnApplyFilter">🎯 確認範圍重開遊戲</button>
        </div>
        
        <div class="setting-group">
            <div class="setting-item">
                <label for="fontSizeSlider">🔤 全域字體大小:</label>
                <input type="range" id="fontSizeSlider" min="20" max="100" value="66">
                <span id="fontSizeVal">66px</span>
            </div>
            <div class="setting-item">
                <label for="canvasWidthSlider">🖥️ 遊戲畫面寬度:</label>
                <input type="range" id="canvasWidthSlider" min="400" max="1600" step="50" value="1200">
                <span id="canvasWidthVal">1200px</span>
            </div>
        </div>
    </div>

    <div id="gameContainer">
        <div id="questionBox"><span id="versionTag"></span><span id="qText">讀取雲端題庫中...</span></div>
        <div class="canvas-wrapper">
            <canvas id="gameCanvas" width="1200" height="800"></canvas>
        </div>
        <div id="wrongNotice"></div>
        <div class="score-board">
            <div>得分: <span id="score">0</span></div>
            <div>目前關卡: <span id="level">1</span> / <span id="totalLevels">0</span></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

        // 您的 Web 應用程式 Firebase 設定
        const firebaseConfig = {
            apiKey: "AIzaSyAc_Yw8TmOnAM4PIo9NR3TCzs9H2C_aRW8",
            authDomain: "snake-wordquiz.firebaseapp.com",
            databaseURL: "https://snake-wordquiz-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "snake-wordquiz",
            storageBucket: "snake-wordquiz.firebasestorage.app",
            messagingSenderId: "941457178414",
            appId: "1:941457178414:web:5e3e52fa3cb5864d17c4bf",
            measurementId: "G-978S568P4X"
        };

        // 初始化 Firebase 與 Realtime Database
        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        const dbRef = ref(database, "snake_questions");

        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const fontSizeSlider = document.getElementById("fontSizeSlider");
        const canvasWidthSlider = document.getElementById("canvasWidthSlider");
        const questionBox = document.getElementById("questionBox");
        const wrongNotice = document.getElementById("wrongNotice");
        const dbStatus = document.getElementById("dbStatus");
        
        const startLessonSelect = document.getElementById("startLessonSelect");
        const endLessonSelect = document.getElementById("endLessonSelect");

        let currentFontSize = 66; 
        let snake = [];
        let snakeLength = 5;
        let speed = 5; 
        let mouseX = 600, mouseY = 400; 
        
        const defaultQuestions = [
            { version: "康軒-5-1", question: "文「 」", A: "載", B: "字", C: "讓", answer: "B" },
            { version: "康軒-5-1", question: "輕「 」", A: "舟", B: "忌", C: "訣", answer: "A" },
            { version: "康軒-5-1", question: "「 」水", A: "練", B: "習", C: "灑", answer: "C" },
            { version: "康軒-5-1", question: "「 」人", A: "載", B: "似", C: "灑", answer: "A" }
        ];

        let allDBQuestions = [];     
        let filteredQuestions = [];  
        let currentQuestionIndex = 0;
        let score = 0;
        let gameInterval;
        let foods = []; 
        let isGameOver = false;
        let noticeTimeout;

        // 即時監聽雲端資料庫
        onValue(dbRef, (snapshot) => {
            const data = snapshot.val();
            if (data && Array.isArray(data)) {
                allDBQuestions = data;
                dbStatus.textContent = `🟢 雲端資料庫連線成功！共儲存 ${allDBQuestions.length} 題。`;
            } else if (data && typeof data === 'object') {
                allDBQuestions = Object.values(data);
                dbStatus.textContent = `🟢 雲端資料庫連線成功！共儲存 ${allDBQuestions.length} 題。`;
            } else {
                allDBQuestions = defaultQuestions;
                set(dbRef, defaultQuestions);
                dbStatus.textContent = "🟡 雲端查無資料，已自動建立預設題目。";
            }
            updateLessonDropdowns(); 
            applyFilterAndStart();   
        }, (error) => {
            dbStatus.textContent = "🔴 資料庫連線失敗，請檢查安全規則設定。";
            console.error(error);
        });

        function updateLessonDropdowns() {
            const versions = [...new Set(allDBQuestions.map(q => q.version))];
            versions.sort((a, b) => a.localeCompare(b, undefined, { numeric: true, sensitivity: 'base' }));

            const prevStart = startLessonSelect.value;
            const prevEnd = endLessonSelect.value;

            startLessonSelect.innerHTML = "";
            endLessonSelect.innerHTML = "";

            versions.forEach(v => {
                const opt1 = document.createElement("option");
                opt1.value = v; opt1.textContent = v;
                startLessonSelect.appendChild(opt1);

                const opt2 = document.createElement("option");
                opt2.value = v; opt2.textContent = v;
                endLessonSelect.appendChild(opt2);
            });

            if(versions.includes(prevStart)) startLessonSelect.value = prevStart;
            if(versions.includes(prevEnd)) endLessonSelect.value = prevEnd;
            else endLessonSelect.value = versions[versions.length - 1]; 
        }

        function applyFilterAndStart() {
            const startVal = startLessonSelect.value;
            const endVal = endLessonSelect.value;

            const versions = [...new Set(allDBQuestions.map(q => q.version))];
            versions.sort((a, b) => a.localeCompare(b, undefined, { numeric: true, sensitivity: 'base' }));

            const startIndex = versions.indexOf(startVal);
            const endIndex = versions.indexOf(endVal);

            const allowedVersions = startIndex <= endIndex 
                ? versions.slice(startIndex, endIndex + 1)
                : versions.slice(endIndex, startIndex + 1); 

            filteredQuestions = allDBQuestions.filter(q => allowedVersions.includes(q.version));
            filteredQuestions.sort(() => Math.random() - 0.5);

            document.getElementById('totalLevels').textContent = filteredQuestions.length;
            startGame();
        }

        document.getElementById("btnExport").addEventListener("click", exportTemplate);
        document.getElementById("btnReset").addEventListener("click", resetToDefaultInDB);
        document.getElementById('excelFile').addEventListener('change', handleExcelUpload);
        document.getElementById('btnApplyFilter').addEventListener('click', applyFilterAndStart);

        function exportTemplate() {
            if (allDBQuestions.length === 0) return;
            const worksheet = XLSX.utils.json_to_sheet(allDBQuestions);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "雲端所有題庫");
            XLSX.writeFile(workbook, "雲端資料庫_完整題庫備份.xlsx");
        }

        // 🔒 密碼保護的核心重置功能
        function resetToDefaultInDB() {
            // 第一關：要求輸入管理密碼
            const password = prompt("🔒 此操作將刪除雲端所有題目！\n請輸入管理員密碼以繼續：");
            
            if (password === null) return; // 使用者按取消

            if (password !== "9512626") {
                alert("❌ 密碼錯誤！無法重置資料庫。");
                return;
            }

            // 第二關：再次確認
            if (confirm("⚠️ 密碼正確。確定要完全覆蓋並清空現有雲端資料庫的所有內容，恢復成預設的 4 題嗎？")) {
                dbStatus.textContent = "🔄 正在重置雲端...";
                set(dbRef, defaultQuestions).then(() => {
                    alert("✅ 雲端資料庫已徹底還原為預設題庫！");
                }).catch(err => {
                    alert("❌ 雲端更新失敗，請檢查網路或 Firebase 安全規則。");
                    console.error(err);
                });
            }
        }

        function handleExcelUpload(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(evt) {
                try {
                    const data = evt.target.result;
                    const workbook = XLSX.read(data, { type: 'binary' });
                    const firstSheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[firstSheetName];
                    const jsonRows = XLSX.utils.sheet_to_json(worksheet);
                    
                    if(jsonRows.length === 0) {
                        alert("❌ 讀取失敗：Excel 內無資料！");
                        return;
                    }

                    const importedQuestions = jsonRows.map((row, index) => {
                        const cleanRow = {};
                        Object.keys(row).forEach(key => {
                            cleanRow[key.toString().toLowerCase().trim()] = row[key];
                        });

                        const v = cleanRow['version'] || cleanRow['版本'] || "未分類";
                        const q = cleanRow['question'] || cleanRow['題目'];
                        const a = cleanRow['optiona'] || cleanRow['a'];
                        const b = cleanRow['optionb'] || cleanRow['b'];
                        const c = cleanRow['optionc'] || cleanRow['c'];
                        const ans = cleanRow['answer'] || cleanRow['答案'];

                        if (!q || !a || !b || !c || !ans) {
                            throw new Error(`第 ${index + 2} 列資料不完整！\n需有 version, question, optionA, optionB, optionC, answer`);
                        }

                        return {
                            version: v.toString().trim(),
                            question: q, A: a, B: b, C: c,
                            answer: ans.toString().trim().toUpperCase()
                        };
                    });
                    
                    const finalCombinedQuestions = allDBQuestions.concat(importedQuestions);

                    dbStatus.textContent = "📤 正在將新題目追加並同步至雲端...";
                    set(dbRef, finalCombinedQuestions).then(() => {
                        alert(`🎉 成功！本次追加了 ${importedQuestions.length} 題。雲端目前總計有 ${finalCombinedQuestions.length} 題！`);
                    }).catch(err => {
                        alert("❌ 上傳失敗，請確認 Firebase 安全規則。");
                        console.error(err);
                    });

                } catch (error) {
                    alert(`⚠️ 匯入失敗！錯誤原因：\n${error.message}`);
                }
                e.target.value = "";
            };
            reader.readAsBinaryString(file);
        }

        // ==========================================
        // 🐍 貪食蛇遊戲核心引擎
        // ==========================================
        fontSizeSlider.addEventListener("input", (e) => {
            currentFontSize = parseInt(e.target.value); 
            document.getElementById("fontSizeVal").textContent = currentFontSize + "px";
            questionBox.style.fontSize = currentFontSize + "px";
        });

        canvasWidthSlider.addEventListener("input", (e) => {
            const width = parseInt(e.target.value);
            const height = Math.round(width * 2 / 3); 
            document.getElementById("canvasWidthVal").textContent = width + "px";
            const oldWidth = canvas.width;
            const oldHeight = canvas.height;
            canvas.width = width;
            canvas.height = height;

            if (foods.length > 0) {
                foods.forEach(food => {
                    food.x = (food.x / oldWidth) * width;
                    food.y = (food.y / oldHeight) * height;
                });
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        });

        function startGame() {
            if (filteredQuestions.length === 0) {
                document.getElementById('qText').textContent = "⚠️ 當前選取的範圍內沒有任何題目，請重新選取！";
                if (gameInterval) clearInterval(gameInterval);
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                return;
            }
            isGameOver = false;
            score = 0;
            currentQuestionIndex = 0;
            snakeLength = 5; 
            document.getElementById('score').textContent = score;
            wrongNotice.textContent = "";
            
            snake = [];
            for (let i = 0; i < snakeLength; i++) {
                snake.push({ x: canvas.width / 2, y: canvas.height / 2 });
            }

            loadQuestion();
            
            if (gameInterval) clearInterval(gameInterval);
            gameInterval = setInterval(gameLoop, 1000 / 60); 
        }

        function loadQuestion() {
            if (currentQuestionIndex >= filteredQuestions.length) {
                isGameOver = true;
                clearInterval(gameInterval);
                alert(`🎉 恭喜你順利答完本範例內所有的 ${filteredQuestions.length} 道關卡！\n最終得分: ${score}`);
                applyFilterAndStart(); 
                return;
            }

            const q = filteredQuestions[currentQuestionIndex];
            document.getElementById('versionTag').textContent = `📍 目前題目範圍：${q.version}`;
            document.getElementById('qText').textContent = `【第 ${currentQuestionIndex+1} 題】${q.question}`;
            document.getElementById('level').textContent = currentQuestionIndex + 1;

            const options = ['A', 'B', 'C'];
            foods = [];

            options.forEach((opt) => {
                let posX, posY, isOverlapping, attempts = 0;
                const minDistance = Math.max(220, currentFontSize * 3.2);

                do {
                    isOverlapping = false;
                    posX = Math.random() * (canvas.width - 350) + 175;
                    posY = Math.random() * (canvas.height - 250) + 125;

                    for (let j = 0; j < foods.length; j++) {
                        let other = foods[j];
                        let dist = Math.sqrt(Math.pow(posX - other.x, 2) + Math.pow(posY - other.y, 2));
                        if (dist < minDistance) { isOverlapping = true; break; }
                    }
                    attempts++;
                    if (attempts > 200) break;
                } while (isOverlapping);

                foods.push({ type: opt, text: q[opt], x: posX, y: posY });
            });
        }

        function gameLoop() {
            if (isGameOver) return;
            updateSnake();
            checkCollisions();
            drawGame();
        }

        function updateSnake() {
            let head = { ...snake[0] };
            let dx = mouseX - head.x; let dy = mouseY - head.y;
            let distance = Math.sqrt(dx * dx + dy * dy);

            if (distance > 5) {
                let angle = Math.atan2(dy, dx);
                head.x += Math.cos(angle) * speed;
                head.y += Math.sin(angle) * speed;
            }

            if (head.x < 0) head.x = canvas.width;
            if (head.x > canvas.width) head.x = 0;
            if (head.y < 0) head.y = canvas.height;
            if (head.y > canvas.height) head.y = 0;

            snake.unshift(head);
            if (snake.length > snakeLength) snake.pop();
        }

        function checkCollisions() {
            let head = snake[0];
            for (let i = 0; i < foods.length; i++) {
                let food = foods[i];
                let dx = head.x - food.x; let dy = head.y - food.y;
                let dist = Math.sqrt(dx * dx + dy * dy);
                const collisionRange = Math.max(35, currentFontSize * 0.7);

                if (dist < 12 + collisionRange) {
                    const currentAnswer = filteredQuestions[currentQuestionIndex].answer;
                    if (food.type === currentAnswer) {
                        score += 10; snakeLength += 3;
                        document.getElementById('score').textContent = score;
                        currentQuestionIndex++; loadQuestion();
                    } else {
                        score -= 5; snakeLength = Math.max(5, snakeLength - 3);
                        document.getElementById('score').textContent = score;
                        clearTimeout(noticeTimeout);
                        wrongNotice.textContent = `❌ 答錯囉！扣 5 分。本題重新挑戰！`;
                        noticeTimeout = setTimeout(() => { wrongNotice.textContent = ""; }, 2000);
                        loadQuestion();
                    }
                    break;
                }
            }
        }

        function drawGame() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            foods.forEach(food => {
                ctx.font = `${currentFontSize}px 'Microsoft JhengHei'`;
                ctx.fillStyle = "#ecf0f1"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
                ctx.fillText(food.text, food.x, food.y);
            });
            snake.forEach((part, index) => {
                ctx.beginPath();
                let radius = index === 0 ? 14 : Math.max(8, 14 - index * 0.2);
                ctx.arc(part.x, part.y, radius, 0, Math.PI * 2);
                ctx.fillStyle = index === 0 ? "#00FF00" : (index % 2 === 0 ? "#27ae60" : "#2ecc71");
                ctx.fill(); ctx.closePath();
            });
        }
    </script>
</body>
</html>
