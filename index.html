<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>遊戲中心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft JhengHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .games-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .game-button {
            padding: 20px 15px;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 80px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .game-button:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .game-button:active {
            transform: translateY(-2px);
        }

        /* 預設幾種好看的漸層色，輪流套用到自動偵測的遊戲上 */
        .color-0 { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .color-1 { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .color-2 { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); }
        .color-3 { background: linear-gradient(135deg, #f6d365 0%, #fda085 100%); }
        .color-4 { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); }

        .btn-update {
            background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%);
            grid-column: 1 / -1;
            font-size: 1em;
            min-height: 60px;
            color: #333;
        }

        .footer {
            color: #666;
            font-size: 0.9em;
            margin-top: 20px;
        }

        .loading {
            color: #999;
            font-size: 0.9em;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 遊戲中心</h1>
        
        <div class="games-grid" id="gamesGrid">
            </div>

        <div class="footer">
            <p>✨ 選擇你喜歡的遊戲開始玩吧！</p>
            <div class="loading" id="loadingStatus">正在掃描 GitHub 資料夾...</div>
        </div>
    </div>

    <script>
        // 設定你的 GitHub 帳號與儲存庫名稱
        const githubUser = 'goodfishilc';
        const githubRepo = 'game';

        // 特殊網頁對應的中文名稱與 Emoji（選填，若沒設定就會直接用檔案名稱作為按鈕文字）
        const nameMapping = {
            'convenience_store.html': { label: '便利商店', emoji: '🏪' },
            'game.html': { label: '主要遊戲', emoji: '🎯' }
        };

        async function scanGithubFiles() {
            const loadingStatus = document.getElementById('loadingStatus');
            try {
                // 呼叫 GitHub Open API 讀取該資料夾底下的所有檔案
                const response = await fetch(`https://api.github.com/repos/${githubUser}/${githubRepo}/contents/`);
                
                if (!response.ok) {
                    throw new Error('無法讀取 GitHub 目錄');
                }

                const files = await response.json();
                
                // 過濾出所有 .html 檔案，並且排除掉首頁 index.html 本身
                const htmlFiles = files.filter(file => 
                    file.name.endsWith('.html') && 
                    file.name.toLowerCase() !== 'index.html'
                );

                return htmlFiles;
            } catch (error) {
                console.error(error);
                loadingStatus.textContent = '❌ 自動掃描失敗，請確認是否已上傳至 GitHub';
                return [];
            }
        }

        async function initializeGames() {
            const gamesGrid = document.getElementById('gamesGrid');
            const loadingStatus = document.getElementById('loadingStatus');
            
            loadingStatus.textContent = '🔄 正在手動同步最新檔案...';
            
            const files = await scanGithubFiles();
            
            // 清空舊列表
            gamesGrid.innerHTML = '';
            
            if (files.length === 0) {
                loadingStatus.textContent = '📭 資料夾內沒有發現其他 HTML 遊戲網頁。';
                return;
            }

            // 渲染自動抓到的 HTML 檔案
            files.forEach((file, index) => {
                const fileName = file.name;
                const link = document.createElement('a');
                
                // 設定跳轉網址
                link.href = `https://${githubUser}.github.io/${githubRepo}/${fileName}`;
                
                // 自動分配樣式顏色（0~4 循環）
                link.className = `game-button color-${index % 5}`;
                
                // 檢查是否有設定中文對應，沒有的話就直接拿檔名（去掉 .html）當名字
                if (nameMapping[fileName]) {
                    link.textContent = `${nameMapping[fileName].emoji} ${nameMapping[fileName].label}`;
                } else {
                    const cleanName = fileName.replace('.html', '');
                    link.textContent = `🕹️ ${cleanName}`;
                }
                
                gamesGrid.appendChild(link);
            });
            
            // 重新加上手動刷新按鈕
            const updateButton = document.createElement('button');
            updateButton.className = 'game-button btn-update';
            updateButton.textContent = '🔄 重新掃描資料夾內的新網頁';
            updateButton.onclick = async () => {
                await initializeGames();
            };
            gamesGrid.appendChild(updateButton);
            
            loadingStatus.textContent = `✅ 掃描完成！共發現 ${files.length} 個遊戲網頁`;
        }

        // 首次載入自動執行
        document.addEventListener('DOMContentLoaded', initializeGames);
    </script>
</body>
</html>
