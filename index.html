<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>遊戲中心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft JhengHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .games-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .game-button {
            padding: 20px 15px;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 80px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .game-button:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .game-button:active {
            transform: translateY(-2px);
        }

        .btn-convenience-store {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .btn-game {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .btn-update {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            grid-column: 1 / -1;
            font-size: 1em;
            min-height: 60px;
        }

        .footer {
            color: #666;
            font-size: 0.9em;
            margin-top: 20px;
        }

        .loading {
            color: #999;
            font-size: 0.9em;
            margin-top: 10px;
        }
        
        /* 新增錯誤紅字樣式 */
        .error-msg {
            color: #ff4d4d !important;
            font-weight: bold;
            background: #fff0f0;
            padding: 5px 10px;
            border-radius: 5px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 遊戲中心</h1>
        
        <div class="games-grid" id="gamesGrid">
            </div>

        <div class="footer">
            <p>✨ 選擇你喜歡的遊戲開始玩吧！</p>
            <div class="loading" id="loadingStatus">正在加載遊戲...</div>
        </div>
    </div>

    <script>
        const gameConfig = [
            {
                file: 'convenience_store.html',
                label: '便利商店',
                emoji: '🏪',
                className: 'btn-convenience-store'
            },
            {
                file: 'game.html',
                label: '遊戲',
                emoji: '🎯',
                className: 'btn-game'
            }
        ];

        async function loadGameConfig() {
            const loadingStatus = document.getElementById('loadingStatus');
            try {
                const response = await fetch(`games.json?t=${new Date().getTime()}`);
                
                if (!response.ok) {
                    throw new Error(`找不到 games.json 檔案 (錯誤碼: ${response.status})`);
                }
                
                const config = await response.json();
                
                if (!config.games || !Array.isArray(config.games)) {
                    throw new Error("games.json 格式錯誤，缺少 'games' 陣列");
                }
                
                return config.games;
            } catch (error) {
                console.error(error);
                // 顯示具體的錯誤訊息給使用者看
                loadingStatus.innerHTML = `<span class="error-msg">⚠️ 讀取失敗: ${error.message}，已啟用預設列表。</span>`;
                return gameConfig;
            }
        }

        async function initializeGames() {
            const gamesGrid = document.getElementById('gamesGrid');
            const loadingStatus = document.getElementById('loadingStatus');
            
            // 先清空提示（除非上面 load 失敗有噴 error 才會被覆蓋）
            loadingStatus.textContent = '載入中...';
            
            const games = await loadGameConfig();
            
            gamesGrid.innerHTML = '';
            
            games.forEach(game => {
                const link = document.createElement('a');
                link.href = `https://goodfishilc.github.io/game/${game.file}`;
                link.className = `game-button ${game.className}`;
                link.textContent = `${game.emoji} ${game.label}`;
                gamesGrid.appendChild(link);
            });
            
            const updateButton = document.createElement('button');
            updateButton.className = 'game-button btn-update';
            updateButton.textContent = '⚙️ 刷新遊戲列表';
            updateButton.onclick = async () => {
                await initializeGames();
            };
            gamesGrid.appendChild(updateButton);
            
            // 如果沒出錯，就把「載入中」清空
            if (!loadingStatus.querySelector('.error-msg')) {
                loadingStatus.textContent = '✅ 列表已是最新狀態';
            }
        }

        document.addEventListener('DOMContentLoaded', initializeGames);
    </script>
</body>
</html>
