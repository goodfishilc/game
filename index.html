<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>遊戲中心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft JhengHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .games-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .game-button {
            padding: 20px 15px;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 80px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .game-button:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .game-button:active {
            transform: translateY(-2px);
        }

        .btn-convenience-store {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .btn-game {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .btn-update {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            grid-column: 1 / -1;
            font-size: 1em;
            min-height: 60px;
        }

        .footer {
            color: #666;
            font-size: 0.9em;
            margin-top: 20px;
        }

        /* 彈出視窗樣式 */
        .modal {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
        }

        .modal-content {
            background-color: #fefefe;
            margin: 10% auto;
            padding: 20px;
            border: 1px solid #888;
            border-radius: 10px;
            width: 80%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .modal-content h2 {
            margin-bottom: 15px;
            color: #333;
        }

        .modal-content input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
            box-sizing: border-box;
        }

        .modal-content input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.5);
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .modal-buttons button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-confirm {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-confirm:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-cancel {
            background: #ddd;
            color: #333;
        }

        .btn-cancel:hover {
            background: #ccc;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 遊戲中心</h1>
        
        <div class="games-grid">
            <a href="https://goodfishilc.github.io/game/convenience_store.html" class="game-button btn-convenience-store">
                🏪 便利商店
            </a>
            <a href="https://goodfishilc.github.io/game/game.html" class="game-button btn-game">
                🎯 遊戲
            </a>
            <button class="game-button btn-update" onclick="openUpdateModal()">
                ⚙️ 更新連結
            </button>
        </div>

        <div class="footer">
            <p>✨ 選擇你喜歡的遊戲開始玩吧！</p>
        </div>
    </div>

    <!-- 更新連結彈出視窗 -->
    <div id="updateModal" class="modal">
        <div class="modal-content">
            <h2>🔗 更新倉庫檔案連結</h2>
            <div>
                <label for="fileName" style="display: block; margin-bottom: 5px; text-align: left; color: #333;">檔案名稱:</label>
                <input type="text" id="fileName" placeholder="例如: convenience_store.html" />
                <label for="gameLabel" style="display: block; margin-bottom: 5px; text-align: left; color: #333;">按鈕標籤:</label>
                <input type="text" id="gameLabel" placeholder="例如: 便利商店" />
                <label for="gameEmoji" style="display: block; margin-bottom: 5px; text-align: left; color: #333;">emoji:</label>
                <input type="text" id="gameEmoji" placeholder="例如: 🏪" />
            </div>
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeUpdateModal()">取消</button>
                <button class="btn-confirm" onclick="updateLink()">確認更新</button>
            </div>
        </div>
    </div>

    <script>
        function openUpdateModal() {
            document.getElementById("updateModal").style.display = "block";
            document.getElementById("fileName").value = "";
            document.getElementById("gameLabel").value = "";
            document.getElementById("gameEmoji").value = "";
            document.getElementById("fileName").focus();
        }

        function closeUpdateModal() {
            document.getElementById("updateModal").style.display = "none";
        }

        function updateLink() {
            const fileName = document.getElementById("fileName").value.trim();
            const gameLabel = document.getElementById("gameLabel").value.trim();
            const gameEmoji = document.getElementById("gameEmoji").value.trim();

            if (!fileName || !gameLabel || !gameEmoji) {
                alert("請填寫所有欄位！");
                return;
            }

            // 生成新的連結
            const newLink = `https://goodfishilc.github.io/game/${fileName}`;
            const newButton = `<a href="${newLink}" class="game-button btn-game">
                ${gameEmoji} ${gameLabel}
            </a>`;

            // 在遊戲網格中添加新按鈕
            const gamesGrid = document.querySelector(".games-grid");
            const tempDiv = document.createElement("div");
            tempDiv.innerHTML = newButton;
            gamesGrid.insertBefore(tempDiv.firstElementChild, gamesGrid.querySelector(".btn-update"));

            // 清空輸入框並關閉彈出視窗
            closeUpdateModal();
            alert("✨ 連結已成功添加！");
        }

        // 點擊彈出視窗外部時關閉
        window.onclick = function(event) {
            const modal = document.getElementById("updateModal");
            if (event.target == modal) {
                modal.style.display = "none";
            }
        }

        // 按 Enter 鍵確認
        document.addEventListener("keypress", function(event) {
            const modal = document.getElementById("updateModal");
            if (modal.style.display === "block" && event.key === "Enter") {
                updateLink();
            }
        });
    </script>
</body>
</html>
