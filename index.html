<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>遊戲中心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft JhengHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .games-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .game-button {
            padding: 20px 15px;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 80px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .game-button:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .game-button:active {
            transform: translateY(-2px);
        }

        .btn-convenience-store {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .btn-game {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .footer {
            color: #666;
            font-size: 0.9em;
            margin-top: 20px;
        }

        .loading {
            color: #999;
            font-size: 0.85em;
            margin-top: 10px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 遊戲中心</h1>
        
        <div class="games-grid" id="gamesGrid">
            </div>

        <div class="footer">
            <p>✨ 選擇你喜歡的遊戲開始玩吧！</p>
            <div class="loading" id="loadingStatus">正在加載遊戲...</div>
        </div>
    </div>

    <script>
        // 遊戲配置 - 預設的遊戲信息
        const gameConfig = [
            {
                file: 'convenience_store.html',
                label: '便利商店',
                emoji: '🏪',
                className: 'btn-convenience-store'
            },
            {
                file: 'game.html',
                label: '遊戲',
                emoji: '🎯',
                className: 'btn-game'
            }
        ];

        // 自動加載配置文件（加上時間戳記防止快取）
        async function loadGameConfig() {
            try {
                // 使用封裝好的 cache buster，確保每次都能抓到最新的 json 檔案
                const response = await fetch(`games.json?t=${new Date().getTime()}`);
                if (response.ok) {
                    const config = await response.json();
                    return config.games || gameConfig;
                }
            } catch (error) {
                console.log('未找到 games.json 或讀取失敗，使用預設配置');
            }
            return gameConfig;
        }

        // 初始化與重新渲染遊戲按鈕
        async function initializeGames(isAutoRefresh = false) {
            const gamesGrid = document.getElementById('gamesGrid');
            const loadingStatus = document.getElementById('loadingStatus');
            
            if (isAutoRefresh) {
                loadingStatus.textContent = '🔄 正在背景自動檢查更新...';
            }

            try {
                const games = await loadGameConfig();
                
                // 清空網格
                gamesGrid.innerHTML = '';
                
                // 添加遊戲按鈕
                games.forEach(game => {
                    const link = document.createElement('a');
                    link.href = `https://goodfishilc.github.io/game/${game.file}`;
                    link.className = `game-button ${game.className}`;
                    link.textContent = `${game.emoji} ${game.label}`;
                    gamesGrid.appendChild(link);
                });
                
                // 更新提示文字
                const now = new Date();
                const timeString = now.toLocaleTimeString();
                loadingStatus.textContent = `⏱️ 最後更新時間：${timeString}（每 10 秒自動同步）`;

            } catch (error) {
                console.error('加載遊戲配置失敗:', error);
                loadingStatus.textContent = '❌ 自動同步失敗，請檢查網路連線';
            }
        }

        // 頁面首次載入時初始化
        document.addEventListener('DOMContentLoaded', () => {
            initializeGames(false);

            // 設定定時器：每 10,000 毫秒（10 秒）自動在背景更新一次
            setInterval(() => {
                initializeGames(true);
            }, 10,000); 
        });
    </script>
</body>
</html>
