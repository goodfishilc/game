<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全字體可調式問答貪食蛇 - Excel 題目版</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft JhengHei', Arial, sans-serif;
            background: #2c3e50;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }

        h1 { margin-bottom: 10px; }

        /* 設定與控制面板 */
        .control-panel {
            background: #34495e;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 800px;
        }

        .upload-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn-export {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 8px 16px;
            font-size: 1em;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .btn-export:hover {
            background: #27ae60;
        }

        .btn-reset {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px 16px;
            font-size: 1em;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .btn-reset:hover {
            background: #c0392b;
        }

        .setting-group {
            display: flex;
            justify-content: space-around;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 15px;
            background: rgba(0,0,0,0.2);
            padding: 10px;
            border-radius: 8px;
            gap: 10px;
        }

        .setting-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .setting-item label {
            font-weight: bold;
            font-size: 0.95em;
        }

        .file-input {
            color: #ecf0f1;
            margin-left: 10px;
        }

        #gameContainer {
            position: relative;
            display: flex; 
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        #questionBox {
            background: #f1c40f;
            color: #2c3e50;
            padding: 20px;
            border-radius: 8px;
            font-size: 66px; 
            font-weight: bold;
            width: 100%;
            max-width: 1200px; 
            text-align: center;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: font-size 0.1s ease;
        }

        /* 顯示版本冊課的新標籤 */
        #versionTag {
            font-size: 24px;
            display: block;
            color: #7f8c8d;
            margin-bottom: 5px;
            font-weight: normal;
        }

        .canvas-wrapper {
            background: #111;
            border: 4px solid #3498db;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
            display: inline-block;
        }

        canvas {
            display: block;
            cursor: crosshair; 
        }

        .score-board {
            display: flex;
            gap: 40px;
            font-size: 1.8em;
            margin-top: 15px;
            font-weight: bold;
            background: rgba(0,0,0,0.4);
            padding: 10px 30px;
            border-radius: 20px;
        }
        
        #wrongNotice {
            color: #ff4757;
            font-size: 1.4em;
            margin-top: 10px;
            font-weight: bold;
            min-height: 1.5em;
            transition: all 0.2s;
        }
    </style>
</head>
<body>

    <h1>🐍 全字體可調式問答貪食蛇</h1>
    
    <div class="control-panel">
        <div id="setupBox" class="upload-section">
            <div class="btn-group">
                <button class="btn-export" onclick="exportTemplate()">📥 下載題庫 Excel 範本 (含版本資訊)</button>
                <button class="btn-reset" onclick="resetToDefault()">🔄 還原預設題庫</button>
            </div>
            <hr style="width: 100%; border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 5px 0;">
            <div>
                <span>匯入新題庫以自動儲存更新 (`.xlsx`)：</span>
                <input type="file" id="excelFile" class="file-input" accept=".xlsx, .xls" />
            </div>
        </div>
        
        <div class="setting-group">
            <div class="setting-item">
                <label for="fontSizeSlider">🔤 全域字體大小:</label>
                <input type="range" id="fontSizeSlider" min="20" max="100" value="66">
                <span id="fontSizeVal">66px</span>
            </div>
            <div class="setting-item">
                <label for="canvasWidthSlider">🖥️ 遊戲畫面寬度:</label>
                <input type="range" id="canvasWidthSlider" min="400" max="1600" step="50" value="1200">
                <span id="canvasWidthVal">1200px</span>
            </div>
        </div>
    </div>

    <div id="gameContainer">
        <div id="questionBox"><span id="versionTag"></span><span id="qText">載入題目中...</span></div>
        <div class="canvas-wrapper">
            <canvas id="gameCanvas" width="1200" height="800"></canvas>
        </div>
        <div id="wrongNotice"></div>
        <div class="score-board">
            <div>得分: <span id="score">0</span></div>
            <div>目前關卡: <span id="level">1</span></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        const fontSizeSlider = document.getElementById("fontSizeSlider");
        const canvasWidthSlider = document.getElementById("canvasWidthSlider");
        const questionBox = document.getElementById("questionBox");
        const wrongNotice = document.getElementById("wrongNotice");

        let currentFontSize = 66; 
        let snake = [];
        let snakeLength = 5;
        let speed = 5; 
        let mouseX = 600, mouseY = 400; 
        
        // 1. 調整預設題庫：第一欄加入 version，欄位對齊「康軒-5-1」格式
        const defaultQuestions = [
            { version: "康軒-5-1", question: "文「 」", A: "載", B: "字", C: "讓", answer: "B" },
            { version: "康軒-5-1", question: "輕「 」", A: "舟", B: "忌", C: "訣", answer: "A" },
            { version: "康軒-5-1", question: "「 」水", A: "練", B: "習", C: "灑", answer: "C" },
            { version: "康軒-5-1", question: "「 」人", A: "載", B: "似", C: "灑", answer: "A" },
            { version: "康軒-5-1", question: "「 」開", A: "愁", B: "訣", C: "讓", answer: "C" },
            { version: "康軒-5-1", question: "「 」眉苦臉", A: "灑", B: "練", C: "愁", answer: "C" },
            { version: "康軒-5-1", question: "「 」氣", A: "嘆", B: "愁", C: "忌", answer: "A" },
            { version: "康軒-5-1", question: "「 」諱", A: "忌", B: "載", C: "練", answer: "A" },
            { version: "康軒-5-1", question: "忌「 」", A: "嘆", B: "妒", C: "訣", answer: "B" },
            { version: "康軒-5-1", question: "「 」竅", A: "妒", B: "讓", C: "訣", answer: "C" },
            { version: "康軒-5-1", question: "相「 」", A: "似", B: "嘆", C: "妒", answer: "A" },
            { version: "康軒-5-1", question: "「 」習", A: "習", B: "練", C: "字", answer: "B" },
            { version: "康軒-5-1", question: "學「 」", A: "似", B: "習", C: "載", answer: "B" }
        ];

        // 實作自動讀取與儲存機制：優先讀取記憶庫，若沒有才使用預設題庫
        let questions = JSON.parse(localStorage.getItem("snake_questions")) || defaultQuestions;
        
        let currentQuestionIndex = 0;
        let score = 0;
        let gameInterval;
        let foods = []; 
        let isGameOver = false;
        let noticeTimeout;

        window.onload = function() {
            startGame();
        };

        // 匯出時會將 version 排在第一欄
        function exportTemplate() {
            const worksheet = XLSX.utils.json_to_sheet(questions);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "國語題庫");
            XLSX.writeFile(workbook, "問答貪食蛇_國語題庫(含版本).xlsx");
        }

        // 提供手動重置回原廠預設的按鈕功能
        function resetToDefault() {
            if (confirm("⚠️ 確定要刪除所有後來匯入的題目，恢復成最初的內建預設題庫嗎？")) {
                localStorage.removeItem("snake_questions");
                questions = defaultQuestions;
                startGame();
            }
        }

        fontSizeSlider.addEventListener("input", (e) => {
            currentFontSize = parseInt(e.target.value); 
            document.getElementById("fontSizeVal").textContent = currentFontSize + "px";
            questionBox.style.fontSize = currentFontSize + "px";
        });

        canvasWidthSlider.addEventListener("input", (e) => {
            const width = parseInt(e.target.value);
            const height = Math.round(width * 2 / 3); 
            document.getElementById("canvasWidthVal").textContent = width + "px";
            
            const oldWidth = canvas.width;
            const oldHeight = canvas.height;
            canvas.width = width;
            canvas.height = height;

            if (foods.length > 0) {
                foods.forEach(food => {
                    food.x = (food.x / oldWidth) * width;
                    food.y = (food.y / oldHeight) * height;
                });
            }
        });

        document.getElementById('excelFile').addEventListener('change', handleExcelUpload);

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        });

        function handleExcelUpload(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(evt) {
                try {
                    const data = evt.target.result;
                    const workbook = XLSX.read(data, { type: 'binary' });
                    const firstSheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[firstSheetName];
                    const jsonRows = XLSX.utils.sheet_to_json(worksheet);
                    
                    if(jsonRows.length === 0) {
                        alert("❌ 讀取失敗：Excel 內無資料！");
                        return;
                    }

                    const importedQuestions = jsonRows.map((row, index) => {
                        const cleanRow = {};
                        Object.keys(row).forEach(key => {
                            cleanRow[key.toString().toLowerCase().trim()] = row[key];
                        });

                        // 新增驗證 version 欄位 (可支援寫成 version 或「版本」)
                        const v = cleanRow['version'] || cleanRow['版本'] || "未分類";
                        const q = cleanRow['question'] || cleanRow['題目'];
                        const a = cleanRow['optiona'] || cleanRow['a'];
                        const b = cleanRow['optionb'] || cleanRow['b'];
                        const c = cleanRow['optionc'] || cleanRow['c'];
                        const ans = cleanRow['answer'] || cleanRow['答案'];

                        if (!q || !a || !b || !c || !ans) {
                            throw new Error(`第 ${index + 2} 列資料不完整！\n需有 version, question, optionA, optionB, optionC, answer`);
                        }

                        return {
                            version: v.toString().trim(),
                            question: q,
                            A: a,
                            B: b,
                            C: c,
                            answer: ans.toString().trim().toUpperCase()
                        };
                    });
                    
                    // 【自動寫入儲存機制】直接寫入 localStorage 內，往後開啟網頁都不會遺失
                    questions = importedQuestions;
                    localStorage.setItem("snake_questions", JSON.stringify(questions));
                    
                    alert(`📥 成功導入並永久儲存了 ${questions.length} 題新題目！`);
                    startGame();

                } catch (error) {
                    console.error(error);
                    alert(`⚠️ 匯入失敗！錯誤原因：\n${error.message}`);
                }
                // 清空檔案選擇器，以便重複匯入同檔名檔案
                e.target.value = "";
            };
            reader.readAsBinaryString(file);
        }

        function startGame() {
            isGameOver = false;
            score = 0;
            currentQuestionIndex = 0;
            snakeLength = 5; 
            document.getElementById('score').textContent = score;
            wrongNotice.textContent = "";
            
            snake = [];
            for (let i = 0; i < snakeLength; i++) {
                snake.push({ x: canvas.width / 2, y: canvas.height / 2 });
            }

            loadQuestion();
            
            if (gameInterval) clearInterval(gameInterval);
            gameInterval = setInterval(gameLoop, 1000 / 60); 
        }

        function loadQuestion() {
            if (currentQuestionIndex >= questions.length) {
                isGameOver = true;
                clearInterval(gameInterval);
                alert(`🎉 恭喜你順利答完全部題目！\n最終得分: ${score}`);
                startGame(); // 結束後直接開啟下一輪
                return;
            }

            const q = questions[currentQuestionIndex];
            
            // 渲染版本與題目內容
            document.getElementById('versionTag').textContent = `📍 範圍：${q.version}`;
            document.getElementById('qText').textContent = `【第 ${currentQuestionIndex+1} 題】${q.question}`;
            document.getElementById('level').textContent = currentQuestionIndex + 1;

            const options = ['A', 'B', 'C'];
            foods = [];

            options.forEach((opt, index) => {
                let posX, posY;
                let isOverlapping;
                let attempts = 0;
                
                const minDistance = Math.max(220, currentFontSize * 3.2);

                do {
                    isOverlapping = false;
                    posX = Math.random() * (canvas.width - 350) + 175;
                    posY = Math.random() * (canvas.height - 250) + 125;

                    for (let j = 0; j < foods.length; j++) {
                        let other = foods[j];
                        let dist = Math.sqrt(Math.pow(posX - other.x, 2) + Math.pow(posY - other.y, 2));
                        
                        if (dist < minDistance) {
                            isOverlapping = true;
                            break;
                        }
                    }
                    
                    attempts++;
                    if (attempts > 200) {
                        break; 
                    }
                } while (isOverlapping);

                foods.push({
                    type: opt,
                    text: q[opt],
                    x: posX,
                    y: posY
                });
            });
        }

        function gameLoop() {
            if (isGameOver) return;
            updateSnake();
            checkCollisions();
            drawGame();
        }

        function updateSnake() {
            let head = { ...snake[0] };
            let dx = mouseX - head.x;
            let dy = mouseY - head.y;
            let distance = Math.sqrt(dx * dx + dy * dy);

            if (distance > 5) {
                let angle = Math.atan2(dy, dx);
                head.x += Math.cos(angle) * speed;
                head.y += Math.sin(angle) * speed;
            }

            if (head.x < 0) head.x = canvas.width;
            if (head.x > canvas.width) head.x = 0;
            if (head.y < 0) head.y = canvas.height;
            if (head.y > canvas.height) head.y = 0;

            snake.unshift(head);
            if (snake.length > snakeLength) {
                snake.pop();
            }
        }

        function checkCollisions() {
            let head = snake[0];

            for (let i = 0; i < foods.length; i++) {
                let food = foods[i];
                let dx = head.x - food.x;
                let dy = head.y - food.y;
                let dist = Math.sqrt(dx * dx + dy * dy);

                const collisionRange = Math.max(35, currentFontSize * 0.7);

                if (dist < 12 + collisionRange) {
                    const currentAnswer = questions[currentQuestionIndex].answer;
                    
                    if (food.type === currentAnswer) {
                        score += 10;
                        snakeLength += 3; 
                        document.getElementById('score').textContent = score;
                        currentQuestionIndex++; 
                        loadQuestion();
                    } else {
                        score -= 5;
                        snakeLength = Math.max(5, snakeLength - 3); 
                        document.getElementById('score').textContent = score;
                        
                        clearTimeout(noticeTimeout);
                        wrongNotice.textContent = `❌ 答錯囉！扣 5 分。本題重新挑戰！`;
                        noticeTimeout = setTimeout(() => { wrongNotice.textContent = ""; }, 2000);
                        
                        loadQuestion();
                    }
                    break;
                }
            }
        }

        function drawGame() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            foods.forEach(food => {
                ctx.font = `${currentFontSize}px 'Microsoft JhengHei'`;
                ctx.fillStyle = "#ecf0f1";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(food.text, food.x, food.y);
            });

            snake.forEach((part, index) => {
                ctx.beginPath();
                let radius = index === 0 ? 14 : Math.max(8, 14 - index * 0.2);
                ctx.arc(part.x, part.y, radius, 0, Math.PI * 2);
                ctx.fillStyle = index === 0 ? "#00FF00" : (index % 2 === 0 ? "#27ae60" : "#2ecc71");
                ctx.fill();
                ctx.closePath();
            });
        }
    </script>
</body>
</html>
