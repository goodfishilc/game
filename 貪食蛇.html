<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>滑鼠操控貪食蛇 - Excel 題目版</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        body {
            font-family: 'Microsoft JhengHei', Arial, sans-serif;
            background: #2c3e50;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            overflow-x: hidden;
        }

        h1 { margin-bottom: 10px; }

        .setup-container {
            background: #34495e;
            padding: 15px 25px;
            border-radius: 10px;
            margin-bottom: 15px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .file-input {
            margin-top: 10px;
            color: #ecf0f1;
        }

        #gameContainer {
            position: relative;
            display: none; /* 匯入成功後才顯示 */
            flex-direction: column;
            align-items: center;
        }

        #questionBox {
            background: #f1c40f;
            color: #2c3e50;
            padding: 15px;
            border-radius: 8px;
            font-size: 1.2em;
            font-weight: bold;
            max-width: 600px;
            width: 100%;
            text-align: center;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        canvas {
            background: #111;
            border: 4px solid #3498db;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            cursor: crosshair; /* 滑鼠游標變成十字準心 */
        }

        .score-board {
            display: flex;
            gap: 20px;
            font-size: 1.2em;
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>🐍 滑鼠操控問答貪食蛇</h1>
    
    <div class="setup-container" id="setupBox">
        <p>請先匯入包含題目的 Excel 檔案 (`.xlsx`)</p>
        <input type="file" id="excelFile" class="file-input" accept=".xlsx, .xls" />
    </div>

    <div id="gameContainer">
        <div id="questionBox">載入題目中...</div>
        <canvas id="gameCanvas" width="600" height="400"></canvas>
        <div class="score-board">
            <div>得分: <span id="score">0</span></div>
            <div>目前關卡: <span id="level">1</span></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // 遊戲變數
        let snake = [];
        let snakeLength = 5;
        let speed = 4; // 蛇移動速度
        let mouseX = 300, mouseY = 200; // 滑鼠座標
        let questions = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let gameInterval;
        let foods = []; // 存放 A, B, C 三個選項食物
        let isGameOver = false;

        // 監聽 Excel 檔案上傳
        document.getElementById('excelFile').addEventListener('change', handleExcelUpload);

        // 監聽滑鼠在 Canvas 上的移動
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        });

        // 解析 Excel 檔案
        function handleExcelUpload(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(evt) {
                const data = evt.target.result;
                const workbook = XLSX.read(data, { type: 'binary' });
                const firstSheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[firstSheetName];
                
                // 將 Excel 轉換成 JSON 陣列
                const jsonRows = XLSX.utils.sheet_to_json(worksheet);
                
                if(jsonRows.length === 0) {
                    alert("Excel 檔案內沒有資料！");
                    return;
                }

                // 驗證並整理格式
                questions = jsonRows.map(row => ({
                    question: row.question || "未設定題目",
                    A: row.optionA || "選項A",
                    B: row.optionB || "選項B",
                    C: row.optionC || "選項C",
                    answer: (row.answer || "A").trim().toUpperCase()
                }));

                // 隱藏上傳區，顯示遊戲區
                document.getElementById('setupBox').style.display = 'none';
                document.getElementById('gameContainer').style.display = 'flex';
                
                startGame();
            };
            reader.readAsBinaryString(file);
        }

        // 開始遊戲
        function startGame() {
            isGameOver = false;
            score = 0;
            currentQuestionIndex = 0;
            document.getElementById('score').textContent = score;
            
            // 初始化蛇（置中）
            snake = [];
            for (let i = 0; i < snakeLength; i++) {
                snake.push({ x: 300, y: 200 });
            }

            loadQuestion();
            
            if (gameInterval) clearInterval(gameInterval);
            gameInterval = setInterval(gameLoop, 1000 / 60); // 60 FPS 順暢度
        }

        // 載入題目與隨機產生三個答案食物
        function loadQuestion() {
            if (currentQuestionIndex >= questions.length) {
                alert("🎉 恭喜你答完了所有題目！太厲害了！");
                location.reload();
                return;
            }

            const q = questions[currentQuestionIndex];
            document.getElementById('questionBox').textContent = `【第 ${currentQuestionIndex+1} 題】${q.question}`;
            document.getElementById('level').textContent = currentQuestionIndex + 1;

            // 隨機在畫面上生成 A, B, C 三個選項的位置（避開牆壁）
            const options = ['A', 'B', 'C'];
            foods = options.map(opt => ({
                type: opt,
                text: q[opt],
                x: Math.random() * (canvas.width - 100) + 50,
                y: Math.random() * (canvas.height - 100) + 50,
                radius: 18
            }));
        }

        // 遊戲主要循環
        function gameLoop() {
            if (isGameOver) return;

            updateSnake();
            checkCollisions();
            drawGame();
        }

        // 更新蛇的位置（滑鼠追蹤演算法）
        function updateSnake() {
            let head = { ...snake[0] };
            
            // 計算蛇頭到滑鼠之間的距離與角度
            let dx = mouseX - head.x;
            let dy = mouseY - head.y;
            let distance = Math.sqrt(dx * dx + dy * dy);

            // 當滑鼠距離蛇頭大於 5 像素時才移動，避免原地抖動
            if (distance > 5) {
                let angle = Math.atan2(dy, dx);
                head.x += Math.cos(angle) * speed;
                head.y += Math.sin(angle) * speed;
            }

            // 新增蛇頭，移出蛇尾，達到移動效果
            snake.unshift(head);
            if (snake.length > snakeLength) {
                snake.pop();
            }
        }

        // 檢查碰撞（撞牆、吃東西）
        function checkCollisions() {
            let head = snake[0];

            // 1. 撞牆檢測
            if (head.x < 0 || head.x > canvas.width || head.y < 0 || head.y > canvas.height) {
                gameOver("💥 撞牆啦！遊戲結束！");
                return;
            }

            // 2. 檢測是否吃到選項食物
            for (let i = 0; i < foods.length; i++) {
                let food = foods[i];
                let dx = head.x - food.x;
                let dy = head.y - food.y;
                let dist = Math.sqrt(dx * dx + dy * dy);

                // 蛇頭半徑約 10，食物半徑 food.radius
                if (dist < 10 + food.radius) {
                    const currentAnswer = questions[currentQuestionIndex].answer;
                    
                    if (food.type === currentAnswer) {
                        // 答對了
                        score += 10;
                        snakeLength += 3; // 蛇變長
                        document.getElementById('score').textContent = score;
                        currentQuestionIndex++;
                        loadQuestion();
                    } else {
                        // 答錯了
                        gameOver(`❌ 答錯囉！正確答案是 (${currentAnswer})。`);
                    }
                    break;
                }
            }
        }

        // 繪製畫面
        function drawGame() {
            // 清空畫布
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. 繪製選項食物
            foods.forEach(food => {
                // 畫食物圓圈背景
                ctx.beginPath();
                ctx.arc(food.x, food.y, food.radius, 0, Math.PI * 2);
                ctx.fillStyle = food.type === 'A' ? '#e74c3c' : food.type === 'B' ? '#2ecc71' : '#3498db';
                ctx.fill();
                ctx.lineWidth = 2;
                ctx.strokeStyle = '#fff';
                ctx.stroke();
                ctx.closePath();

                // 寫上選項英文字 (A, B, C) 與文字內容
                ctx.fillStyle = "white";
                ctx.font = "bold 14px Arial";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(food.type, food.x, food.y - 2);
                
                // 在食物下方顯示選項簡短文字
                ctx.font = "12px 'Microsoft JhengHei'";
                ctx.fillStyle = "#ecf0f1";
                ctx.fillText(food.text, food.x, food.y + food.radius + 12);
            });

            // 2. 繪製貪食蛇
            snake.forEach((part, index) => {
                ctx.beginPath();
                // 蛇頭大一點，身體漸漸變小
                let radius = index === 0 ? 10 : Math.max(6, 10 - index * 0.2);
                ctx.arc(part.x, part.y, radius, 0, Math.PI * 2);
                
                // 蛇頭用亮綠色，身體用墨綠色交替
                ctx.fillStyle = index === 0 ? "#00FF00" : (index % 2 === 0 ? "#27ae60" : "#2ecc71");
                ctx.fill();
                ctx.closePath();
            });
        }

        // 遊戲結束
        function gameOver(msg) {
            isGameOver = true;
            clearInterval(gameInterval);
            alert(`${msg}\n最終得分: ${score}`);
            location.reload(); // 重新整理網頁回到上傳介面
        }
    </script>
</body>
</html>
