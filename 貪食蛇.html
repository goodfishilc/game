<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全字體可調式問答貪食蛇 - Excel 題目版</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft JhengHei', Arial, sans-serif;
            background: #2c3e50;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }

        h1 { margin-bottom: 10px; }

        /* 設定與控制面板 */
        .control-panel {
            background: #34495e;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 800px;
        }

        .upload-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .btn-export {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 8px 16px;
            font-size: 1em;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .btn-export:hover {
            background: #27ae60;
        }

        .setting-group {
            display: flex;
            justify-content: space-around;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 15px;
            background: rgba(0,0,0,0.2);
            padding: 10px;
            border-radius: 8px;
            gap: 10px;
        }

        .setting-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .setting-item label {
            font-weight: bold;
            font-size: 0.95em;
        }

        .file-input {
            color: #ecf0f1;
            margin-left: 10px;
        }

        #gameContainer {
            position: relative;
            display: flex; /* 預設題庫改為一開始就顯示 */
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        #questionBox {
            background: #f1c40f;
            color: #2c3e50;
            padding: 20px;
            border-radius: 8px;
            font-size: 66px; /* 預設 66px */
            font-weight: bold;
            width: 100%;
            max-width: 1200px; 
            text-align: center;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: font-size 0.1s ease;
        }

        .canvas-wrapper {
            background: #111;
            border: 4px solid #3498db;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
            display: inline-block;
        }

        canvas {
            display: block;
            cursor: crosshair; 
        }

        .score-board {
            display: flex;
            gap: 40px;
            font-size: 1.8em;
            margin-top: 15px;
            font-weight: bold;
            background: rgba(0,0,0,0.4);
            padding: 10px 30px;
            border-radius: 20px;
        }
        
        #wrongNotice {
            color: #ff4757;
            font-size: 1.4em;
            margin-top: 10px;
            font-weight: bold;
            min-height: 1.5em;
            transition: all 0.2s;
        }
    </style>
</head>
<body>

    <h1>🐍 全字體可調式問答貪食蛇</h1>
    
    <div class="control-panel">
        <div id="setupBox" class="upload-section">
            <div>
                <button class="btn-export" onclick="exportTemplate()">📥 下載題庫 Excel 範本</button>
            </div>
            <hr style="width: 100%; border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 5px 0;">
            <div>
                <span>想更換題目？請在此匯入題庫 (`.xlsx`)：</span>
                <input type="file" id="excelFile" class="file-input" accept=".xlsx, .xls" />
            </div>
        </div>
        
        <div class="setting-group">
            <div class="setting-item">
                <label for="fontSizeSlider">🔤 全域字體大小:</label>
                <input type="range" id="fontSizeSlider" min="20" max="100" value="66">
                <span id="fontSizeVal">66px</span>
            </div>
            <div class="setting-item">
                <label for="canvasWidthSlider">🖥️ 遊戲畫面寬度:</label>
                <input type="range" id="canvasWidthSlider" min="400" max="1600" step="50" value="1200">
                <span id="canvasWidthVal">1200px</span>
            </div>
        </div>
    </div>

    <div id="gameContainer">
        <div id="questionBox">載入題目中...</div>
        <div class="canvas-wrapper">
            <canvas id="gameCanvas" width="1200" height="800"></canvas>
        </div>
        <div id="wrongNotice"></div>
        <div class="score-board">
            <div>得分: <span id="score">0</span></div>
            <div>目前關卡: <span id="level">1</span></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        const fontSizeSlider = document.getElementById("fontSizeSlider");
        const canvasWidthSlider = document.getElementById("canvasWidthSlider");
        const questionBox = document.getElementById("questionBox");
        const wrongNotice = document.getElementById("wrongNotice");

        let currentFontSize = 66; 
        let snake = [];
        let snakeLength = 5;
        let speed = 5; 
        let mouseX = 600, mouseY = 400; 
        
        // 內建預設題庫（直接讀取自您提供的圖片內容）
        let questions = [
            { question: "文「 」", A: "載", B: "字", C: "讓", answer: "B" },
            { question: "輕「 」", A: "舟", B: "忌", C: "訣", answer: "A" },
            { question: "「 」水", A: "練", B: "習", C: "灑", answer: "C" },
            { question: "「 」人", A: "載", B: "似", C: "灑", answer: "A" },
            { question: "「 」開", A: "愁", B: "訣", C: "讓", answer: "C" },
            { question: "「 」眉苦臉", A: "灑", B: "練", C: "愁", answer: "C" },
            { question: "「 」氣", A: "嘆", B: "愁", C: "忌", answer: "A" },
            { question: "「 」諱", A: "忌", B: "載", C: "練", answer: "A" },
            { question: "忌「 」", A: "嘆", B: "妒", C: "嘆", answer: "B" },
            { question: "「 」竅", A: "妒", B: "讓", C: "訣", answer: "C" },
            { question: "相「 」", A: "似", B: "嘆", C: "妒", answer: "A" },
            { question: "「 」習", A: "習", B: "練", C: "字", answer: "B" },
            { question: "學「 」", A: "似", B: "習", C: "載", answer: "B" }
        ];
        
        let currentQuestionIndex = 0;
        let score = 0;
        let gameInterval;
        let foods = []; 
        let isGameOver = false;
        let noticeTimeout;

        // 網頁載入後，直接以內建題庫自動開始遊戲
        window.onload = function() {
            startGame();
        };

        // --- 範本匯出功能（更新為此 13 題格式，方便老師下載修改） ---
        function exportTemplate() {
            const worksheet = XLSX.utils.json_to_sheet(questions);
            const workbook = XLSX.book_new();
            XLSX.book_append_sheet(workbook, worksheet, "國語題庫");
            XLSX.writeFile(workbook, "問答貪食蛇_國語題庫範本.xlsx");
        }

        fontSizeSlider.addEventListener("input", (e) => {
            currentFontSize = parseInt(e.target.value); 
            document.getElementById("fontSizeVal").textContent = currentFontSize + "px";
            questionBox.style.fontSize = currentFontSize + "px";
        });

        canvasWidthSlider.addEventListener("input", (e) => {
            const width = parseInt(e.target.value);
            const height = Math.round(width * 2 / 3); 
            
            document.getElementById("canvasWidthVal").textContent = width + "px";
            
            const oldWidth = canvas.width;
            const oldHeight = canvas.height;

            canvas.width = width;
            canvas.height = height;

            if (foods.length > 0) {
                foods.forEach(food => {
                    food.x = (food.x / oldWidth) * width;
                    food.y = (food.y / oldHeight) * height;
                });
            }
        });

        document.getElementById('excelFile').addEventListener('change', handleExcelUpload);

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        });

        function handleExcelUpload(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(evt) {
                try {
                    const data = evt.target.result;
                    const workbook = XLSX.read(data, { type: 'binary' });
                    const firstSheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[firstSheetName];
                    const jsonRows = XLSX.utils.sheet_to_json(worksheet);
                    
                    if(jsonRows.length === 0) {
                        alert("❌ 讀取失敗：Excel 內無資料！");
                        return;
                    }

                    // 解析新上傳的 Excel 檔案覆蓋舊題目
                    questions = jsonRows.map((row, index) => {
                        const cleanRow = {};
                        Object.keys(row).forEach(key => {
                            cleanRow[key.toString().toLowerCase().trim()] = row[key];
                        });

                        const q = cleanRow['question'];
                        const a = cleanRow['optiona'] || cleanRow['a'];
                        const b = cleanRow['optionb'] || cleanRow['b'];
                        const c = cleanRow['optionc'] || cleanRow['c'];
                        const ans = cleanRow['answer'];

                        if (!q || !a || !b || !c || !ans) {
                            throw new Error(`第 ${index + 2} 列資料不完整！\n需有 question, optionA, optionB, optionC, answer`);
                        }

                        return {
                            question: q,
                            A: a,
                            B: b,
                            C: c,
                            answer: ans.toString().trim().toUpperCase()
                        };
                    });
                    
                    startGame();

                } catch (error) {
                    console.error(error);
                    alert(`⚠️ 匯入失敗！錯誤原因：\n${error.message}`);
                    location.reload();
                }
            };
            reader.readAsBinaryString(file);
        }

        function startGame() {
            isGameOver = false;
            score = 0;
            currentQuestionIndex = 0;
            snakeLength = 5; 
            document.getElementById('score').textContent = score;
            wrongNotice.textContent = "";
            
            snake = [];
            for (let i = 0; i < snakeLength; i++) {
                snake.push({ x: canvas.width / 2, y: canvas.height / 2 });
            }

            loadQuestion();
            
            if (gameInterval) clearInterval(gameInterval);
            gameInterval = setInterval(gameLoop, 1000 / 60); 
        }

        function loadQuestion() {
            if (currentQuestionIndex >= questions.length) {
                isGameOver = true;
                clearInterval(gameInterval);
                alert(`🎉 恭喜你順利答完全部題目！\n最終得分: ${score}`);
                location.reload();
                return;
            }

            const q = questions[currentQuestionIndex];
            questionBox.textContent = `【第 ${currentQuestionIndex+1} 題】${q.question}`;
            document.getElementById('level').textContent = currentQuestionIndex + 1;

            const options = ['A', 'B', 'C'];
            foods = options.map(opt => ({
                type: opt,
                text: q[opt],
                x: Math.random() * (canvas.width - 300) + 150,
                y: Math.random() * (canvas.height - 200) + 100
            }));
        }

        function gameLoop() {
            if (isGameOver) return;
            updateSnake();
            checkCollisions();
            drawGame();
        }

        function updateSnake() {
            let head = { ...snake[0] };
            let dx = mouseX - head.x;
            let dy = mouseY - head.y;
            let distance = Math.sqrt(dx * dx + dy * dy);

            if (distance > 5) {
                let angle = Math.atan2(dy, dx);
                head.x += Math.cos(angle) * speed;
                head.y += Math.sin(angle) * speed;
            }

            snake.unshift(head);
            if (snake.length > snakeLength) {
                snake.pop();
            }
        }

        function checkCollisions() {
            let head = snake[0];

            if (head.x < 0 || head.x > canvas.width || head.y < 0 || head.y > canvas.height) {
                gameOver("💥 撞牆啦！遊戲結束！");
                return;
            }

            for (let i = 0; i < foods.length; i++) {
                let food = foods[i];
                let dx = head.x - food.x;
                let dy = head.y - food.y;
                let dist = Math.sqrt(dx * dx + dy * dy);

                const collisionRange = Math.max(25, currentFontSize * 0.8);

                if (dist < 12 + collisionRange) {
                    const currentAnswer = questions[currentQuestionIndex].answer;
                    
                    if (food.type === currentAnswer) {
                        score += 10;
                        snakeLength += 3; 
                        document.getElementById('score').textContent = score;
                        currentQuestionIndex++; 
                        loadQuestion();
                    } else {
                        score -= 5;
                        snakeLength = Math.max(5, snakeLength - 3); 
                        document.getElementById('score').textContent = score;
                        
                        clearTimeout(noticeTimeout);
                        wrongNotice.textContent = `❌ 答錯囉！扣 5 分。本題重新挑戰！`;
                        noticeTimeout = setTimeout(() => { wrongNotice.textContent = ""; }, 2000);
                        
                        loadQuestion();
                    }
                    break;
                }
            }
        }

        function drawGame() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            foods.forEach(food => {
                ctx.font = `${currentFontSize}px 'Microsoft JhengHei'`;
                ctx.fillStyle = "#ecf0f1";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(food.text, food.x, food.y);
            });

            // 繪製蛇
            snake.forEach((part, index) => {
                ctx.beginPath();
                let radius = index === 0 ? 14 : Math.max(8, 14 - index * 0.2);
                ctx.arc(part.x, part.y, radius, 0, Math.PI * 2);
                ctx.fillStyle = index === 0 ? "#00FF00" : (index % 2 === 0 ? "#27ae60" : "#2ecc71");
                ctx.fill();
                ctx.closePath();
            });
        }

        function gameOver(msg) {
            isGameOver = true;
            clearInterval(gameInterval);
            alert(`${msg}\n最終得分: ${score}`);
            location.reload(); 
        }
    </script>
</body>
</html>
