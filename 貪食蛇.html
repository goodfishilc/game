<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>文字貪食蛇學習機 - 完美防重疊版</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        h1 { color: #333; margin-bottom: 10px; }
        
        .setup-container {
            background: white;
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            width: 600px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        select, button {
            padding: 8px 12px;
            font-size: 14px;
            border-radius: 4px;
            border: 1px solid #ccc;
            cursor: pointer;
        }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            font-weight: bold;
        }
        button:hover { background-color: #45a049; }

        .info-panel {
            width: 600px;
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #444;
        }
        .question-box {
            background-color: #e1f5fe;
            border-left: 5px solid #0288d1;
            padding: 10px;
            width: 600px;
            box-sizing: border-box;
            margin-bottom: 15px;
            font-size: 20px;
            text-align: center;
            border-radius: 4px;
        }

        canvas {
            background-color: #222;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            border-radius: 6px;
        }
    </style>
</head>
<body>

    <h1>🐍 文字貪食蛇學習機</h1>

    <div class="setup-container">
        <div>
            <label for="lessonSelect">選擇課次：</label>
            <select id="lessonSelect" onchange="changeLesson()">
            </select>
        </div>
        <button onclick="importData()">＋ 匯入/修改自訂題目</button>
    </div>

    <div class="question-box" id="questionDisplay">載入中...</div>
    <div class="info-panel">
        <div id="scoreDisplay">得分: 0</div>
        <div style="color: #ff5722;">提示：用方向鍵操控蛇，去吃「開頭」對準正確答案的文字！</div>
    </div>

    <canvas id="gameCanvas" width="600" height="400"></canvas>

<script>
    let lessonData = {
        "第一課：基礎英文": [
            { question: "『蘋果』的英文是什麼？", answer: "APPLE", options: ["APPLE", "BANANA", "CAT"] },
            { question: "『貓咪』的英文是什麼？", answer: "CAT", options: ["DOG", "CAT", "FOX"] }
        ],
        "第二課：進階單字": [
            { question: "『大象』的英文是什麼？", answer: "ELEPHANT", options: ["ELEPHANT", "TIGER", "LION"] },
            { question: "『香蕉』的英文是什麼？", answer: "BANANA", options: ["APPLE", "BANANA", "ORANGE"] }
        ]
    };

    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    // 網格設定
    const gridSize = 20; 
    const cols = canvas.width / gridSize; // 30 格
    const rows = canvas.height / gridSize; // 20 格

    let snake = [];
    let direction = "RIGHT";
    let nextDirection = "RIGHT";
    let score = 0;
    let gameInterval;
    
    let currentLesson = "第一課：基礎英文";
    let currentQuestionIndex = 0;
    let activeWords = []; // [{gridX, gridY, text, isCorrect, lengthInGrids}]

    function initUI() {
        const select = document.getElementById("lessonSelect");
        select.innerHTML = "";
        for (let lessonName in lessonData) {
            let opt = document.createElement("option");
            opt.value = lessonName;
            opt.innerText = lessonName;
            if(lessonName === currentLesson) opt.selected = true;
            select.appendChild(opt);
        }
        loadQuestion();
    }

    function changeLesson() {
        currentLesson = document.getElementById("lessonSelect").value;
        currentQuestionIndex = 0;
        score = 0;
        document.getElementById("scoreDisplay").innerText = "得分: " + score;
        resetGame();
    }

    function importData() {
        let sampleText = JSON.stringify(lessonData, null, 2);
        let userInput = prompt("請貼上您的 JSON 格式題目：", sampleText);
        if (userInput) {
            try {
                let parsed = JSON.parse(userInput);
                lessonData = parsed;
                currentLesson = Object.keys(lessonData)[0];
                currentQuestionIndex = 0;
                initUI();
                resetGame();
                alert("匯入成功！");
            } catch (e) {
                alert("格式錯誤，請確保輸入的是正確的 JSON 格式！");
            }
        }
    }

    // 載入題目並計算「不重疊」的文字位置
    function loadQuestion() {
        let questions = lessonData[currentLesson];
        if (!questions || questions.length === 0) {
            document.getElementById("questionDisplay").innerText = "本課無題目";
            return;
        }
        
        let q = questions[currentQuestionIndex];
        document.getElementById("questionDisplay").innerText = `【題目】${q.question}`;

        activeWords = [];

        // 建立一個網格佔用矩陣 (false 代表空曠)
        let occupied = Array(rows).fill().map(() => Array(cols).fill(false));

        // 把蛇目前的身體標記為已被佔用
        snake.forEach(cell => {
            let gx = Math.floor(cell.x / gridSize);
            let gy = Math.floor(cell.y / gridSize);
            if (gy >= 0 && gy < rows && gx >= 0 && gx < cols) {
                occupied[gy][gx] = true;
            }
        });

        // 依序放置每個選項
        q.options.forEach(opt => {
            // 估計該單字在網格中需要佔用幾格 (英文字母寬度約為 gridSize 的 0.5~0.6 倍，加上安全間隔)
            // 這裡粗略估計：每 2 個字母佔用 1 格網格，最少佔 2 格，並額外多留 1 格空隙防止貼太近
            let wordGridLength = Math.max(2, Math.ceil(opt.length * 0.6)) + 1; 

            let foundSpace = false;
            let attempts = 0;
            let gridX = 0, gridY = 0;

            // 隨機尋找直到找到一個橫向空間足夠的連續格子
            while (!foundSpace && attempts < 200) {
                attempts++;
                gridY = Math.floor(Math.random() * rows);
                // 確保單字不會超出右邊邊界
                gridX = Math.floor(Math.random() * (cols - wordGridLength));

                // 檢查這段連續的橫向網格有沒有被佔用
                let hasOverlap = false;
                for (let i = 0; i < wordGridLength; i++) {
                    if (occupied[gridY][gridX + i]) {
                        hasOverlap = true;
                        break;
                    }
                }

                if (!hasOverlap) {
                    foundSpace = true;
                    // 將這段空間標記為已佔用，防止下一個單字選到這
                    for (let i = 0; i < wordGridLength; i++) {
                        occupied[gridY][gridX + i] = true;
                    }
                }
            }

            // 將成功找到位置的字加入陣列
            activeWords.push({
                gridX: gridX,
                gridY: gridY,
                text: opt,
                isCorrect: opt === q.answer,
                lengthInGrids: wordGridLength - 1 // 實際單字長度(不含安全空隙)
            });
        });
    }

    function resetGame() {
        clearInterval(gameInterval);
        snake = [
            { x: 5 * gridSize, y: 10 * gridSize },
            { x: 4 * gridSize, y: 10 * gridSize },
            { x: 3 * gridSize, y: 10 * gridSize }
        ];
        direction = "RIGHT";
        nextDirection = "RIGHT";
        loadQuestion();
        gameInterval = setInterval(gameStep, 160); // 稍微調整流暢度
    }

    function gameStep() {
        direction = nextDirection;
        
        let head = { x: snake[0].x, y: snake[0].y };
        if (direction === "RIGHT") head.x += gridSize;
        if (direction === "LEFT") head.x -= gridSize;
        if (direction === "UP") head.y -= gridSize;
        if (direction === "DOWN") head.y += gridSize;

        // 撞牆判斷
        if (head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height) {
            gameOver("撞牆啦！遊戲結束。");
            return;
        }

        // 撞自己判斷
        for (let cell of snake) {
            if (head.x === cell.x && head.y === cell.y) {
                gameOver("吃到自己了！遊戲結束。");
                return;
            }
        }

        snake.unshift(head);

        // 換算蛇頭目前的網格座標
        let headGridX = Math.floor(head.x / gridSize);
        let headGridY = Math.floor(head.y / gridSize);

        let ateSomething = false;
        
        for (let i = 0; i < activeWords.length; i++) {
            let word = activeWords[i];
            
            // 判斷蛇頭是否踩中該單字所佔領的任何一個橫格
            if (headGridY === word.gridY && headGridX >= word.gridX && headGridX < word.gridX + word.lengthInGrids) {
                ateSomething = true;
                if (word.isCorrect) {
                    score += 10;
                    document.getElementById("scoreDisplay").innerText = "得分: " + score;
                    currentQuestionIndex = (currentQuestionIndex + 1) % lessonData[currentLesson].length;
                    alert("答對了！ 加 10 分 🎉");
                    loadQuestion();
                } else {
                    score = Math.max(0, score - 5);
                    document.getElementById("scoreDisplay").innerText = "得分: " + score;
                    alert("答錯了！那是錯誤答案，扣 5 分 ❌ （題目重新洗牌）");
                    loadQuestion(); 
                }
                break;
            }
        }

        if (!ateSomething) {
            snake.pop(); 
        }
        
        draw();
    }

    function draw() {
        ctx.fillStyle = "#222";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 繪製文字選項
        ctx.font = "bold 16px monospace"; // 使用等寬字體讓排版更精準
        ctx.textBaseline = "top";
        
        activeWords.forEach(word => {
            ctx.fillStyle = "#ffeb3b"; 
            // 根據網格座標精準繪製
            ctx.fillText(word.text, word.gridX * gridSize, word.gridY * gridSize + 2); 
        });

        // 繪製蛇
        snake.forEach((cell, index) => {
            ctx.fillStyle = (index === 0) ? "#4caf50" : "#81c784"; 
            ctx.fillRect(cell.x, cell.y, gridSize - 1, gridSize - 1);
        });
    }

    function gameOver(msg) {
        clearInterval(gameInterval);
        alert(msg + `\n最終得分: ${score}`);
        resetGame();
    }

    window.addEventListener("keydown", e => {
        if (e.key === "ArrowUp" && direction !== "DOWN") nextDirection = "UP";
        if (e.key === "ArrowDown" && direction !== "UP") nextDirection = "DOWN";
        if (e.key === "ArrowLeft" && direction !== "RIGHT") nextDirection = "LEFT";
        if (e.key === "ArrowRight" && direction !== "LEFT") nextDirection = "RIGHT";
    });

    initUI();
    resetGame();
</script>
</body>
</html>
